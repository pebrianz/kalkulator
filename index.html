<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><script src="math.js"></script><title>Kalkulator</title><style type="text/css" media="screen">.d,button{font-weight:700;color:#e5e5e5;background-color:#191919}.d,.g,button{background-color:#191919}body{padding:0;margin:0}.g{display:grid;grid-template-columns:repeat(4,80px);grid-template-rows:repeat(7,80px);gap:10px;padding-bottom:10%;align-content:end;justify-content:space-evenly;height:calc(100vh - 101px)}button{font-size:large;border:none;border-radius:5px;box-shadow:6px 6px 10px #0f0f0f,-6px -6px 10px #1e1e1e}.d{overflow-x:auto;font-size:xx-large;grid-row:1/3;grid-column:1/5;text-align:right;padding-right:2rem;height:80%;align-self:center;border-radius:5px;box-shadow:inset 6px 6px 10px #0f0f0f,inset -6px -6px 10px #1e1e1e}.h{font-size:x-large;color:#7f7f7f}.r{font-size:xx-large;font-weight:900;color:#e5e5e5}
</style></head><body><div class="g"><button class="d">0</button> <button class="c">C</button> <button class="p">%</button> <button class="o">÷</button> <button class="del">DEL</button> <button class="n">7</button> <button class="n">8</button> <button class="n">9</button> <button class="o">×</button> <button class="n">4</button> <button class="n">5</button> <button class="n">6</button> <button class="o">-</button> <button class="n">1</button> <button class="n">2</button> <button class="n">3</button> <button class="o">+</button> <button></button> <button class="n">0</button> <button class="k">,</button> <button class="s">=</button></div><script charset="utf-8">const d=document.querySelector(".d"),ns=document.querySelectorAll(".n"),ops=document.querySelectorAll(".o"),s=document.querySelector(".s"),dlt=document.querySelector(".del"),c=document.querySelector(".c"),k=document.querySelector(".k"),p=document.querySelector(".p");for(const n of(math.config({number:"BigNumber",precision:64}),ns))n.addEventListener("click",f=>{let b=f.target.textContent,a=d.textContent,e=a.split(" ");e[e.length-1].length<=16&&(0==a||/\n/g.test(a)?d.innerHTML=b:d.innerHTML+=b)});for(const o of ops)o.addEventListener("click",f=>{let b=f.target.textContent,a=d.textContent;if(/\d$/.test(a)){if(/\n/g.test(a)){let e=a.split(/\n/g),g=e[e.length-1];d.innerHTML=g+` ${b} `}else d.innerHTML+=` ${b} `}else/\s$/.test(a)&&(d.innerHTML=a.slice(0,-3)+` ${b} `)});k.addEventListener("click",()=>{let a=d.textContent,b=a.split(" "),e=b[b.length-1];/\d$/.test(a)&&!e.includes(",")&&(/\n/g.test(a)?d.innerHTML=`${e},`:d.innerHTML+=",")}),p.addEventListener("click",()=>{let e=d.textContent,a=e.split(" "),b=a[a.length-1].replace(",",".");/\d$/.test(b)&&(/\n/g.test(e)?(a=math.evaluate(b+" / 100").toString().replace(".",","),d.innerHTML=a):(a[a.length-1]=math.evaluate(b+" / 100").toString().replace(".",","),d.innerHTML=a.join(" ")))}),dlt.addEventListener("click",()=>{let a=d.textContent,b=a.length-1;/\n/g.test(a)||(1==a.length?d.innerHTML=0:/\d$/.test(a)?d.innerHTML=a.slice(0,b):d.innerHTML=a.slice(0,b-2))}),s.addEventListener("click",()=>{let a=d.textContent;if(!/\n/g.test(a)&&!/\s$/.test(a)){let b=a.replace(/×/g,"*").replace(/÷/g,"/").replace(/,/g,"."),e=math.evaluate(b).toString().replace(/[.]/,",");d.innerHTML=`
                <span class="h">${a}</span></br>
                <span class="r">${e}</span>`}}),c.addEventListener("click",()=>{d.innerHTML="0"})
</script></body></html
